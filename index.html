<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classy Minimal Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #111827);
            font-family: Arial, sans-serif;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 28px;
            font-size: 15px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s ease;
            font-weight: bold;
        }

        .primary {
            background: #3b82f6;
            color: white;
        }

        .primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .secondary:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Melody</h1>
    <p>
        A Music Streaming Platform
    </p>

    <div class="buttons">
        <button onclick="window.location.href='claude/index.html'" class="primary">Version-CL</button>
        <button onclick="window.location.href='chatgpt/index.html'" class="secondary">Version-CG</button>
    </div>
</div>

</body>
</html>
